[pytest]
addopts = -v -n 3 --html=output/report.html --self-contained-html --alluredir=output/allure-results --reruns 1 --reruns-delay 1

# CLI Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# FILE Logging
log_file_level = INFO
log_file_format = %(asctime)s [%(levelname)s] [%(name)s:%(lineno)s] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S